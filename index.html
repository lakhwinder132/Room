<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnonRoom — Anonymous Group Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f0f13;
      --surface:     #18181f;
      --surface2:    #22222d;
      --border:      #2a2a38;
      --text:        #e8e8f0;
      --muted:       #6b6b80;
      --accent:      #7c5cfc;
      --accent-glow: rgba(124,92,252,.25);
      --radius:      14px;
      --msg-radius:  18px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    #lobby {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo-wrap { margin-bottom: 32px; text-align: center; }
    .logo-icon { font-size: 48px; line-height: 1; margin-bottom: 10px; }
    .logo-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #a78bfa, #7c5cfc, #5b8dfc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }
    .card-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; color: var(--text); }
    .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

    input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px 20px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      width: 100%;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); opacity: .9; }
    .btn-ghost { background: var(--surface2); color: var(--text); }
    .btn-ghost:hover { background: var(--border); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .anon-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 20px;
      text-align: center;
      line-height: 1.5;
      width: 100%;
      max-width: 400px;
    }
    .anon-badge strong { color: var(--text); }

    .err-msg { color: #f87171; font-size: 13px; margin-top: 8px; min-height: 18px; }

    /* ── CHAT ── */
    #chat-app { display: none; height: 100vh; flex-direction: column; }

    .chat-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .room-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
      flex-shrink: 0;
    }
    .room-pill:hover { background: var(--border); }
    .room-pill-label { display: flex; align-items: center; gap: 6px; }
    .online-dot {
      width: 7px; height: 7px;
      background: #22c55e;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse-green 2s infinite;
    }
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
      50%      { box-shadow: 0 0 0 4px rgba(34,197,94,0); }
    }
    .online-count { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .my-identity { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); flex-shrink: 0; }
    .identity-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .btn-leave {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--muted);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-leave:hover { border-color: #f87171; color: #f87171; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 72%;
      animation: msg-in .2s ease-out;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.others { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }
    .avatar.hidden { opacity: 0; pointer-events: none; }

    .bubble-wrap { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .msg-row.mine .bubble-wrap { align-items: flex-end; }
    .msg-row.others .bubble-wrap { align-items: flex-start; }

    .bubble-name { font-size: 11px; font-weight: 600; padding: 0 4px; margin-bottom: 2px; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--msg-radius);
      font-size: 14.5px;
      line-height: 1.5;
      word-break: break-word;
      max-width: 100%;
    }
    .msg-row.mine .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 6px; }
    .msg-row.others .bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 6px; }
    .bubble-time { font-size: 10px; color: var(--muted); padding: 0 4px; }

    .msg-system {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 8px 16px;
      background: var(--surface);
      border-radius: 20px;
      margin: 6px auto;
      max-width: 80%;
    }

    .chat-footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 11px 18px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      resize: none;
      max-height: 120px;
      min-height: 46px;
      line-height: 1.4;
      transition: border-color .2s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s, transform .1s;
    }
    #send-btn:active { transform: scale(.92); opacity: .9; }
    #send-btn svg { fill: #fff; }

    .typing-bar { padding: 4px 20px; font-size: 12px; color: var(--muted); height: 22px; flex-shrink: 0; background: var(--bg); }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      padding: 40px;
      text-align: center;
    }
    .empty-state .icon { font-size: 40px; }

    @media (max-width: 520px) {
      .msg-row { max-width: 88%; }
      .card { padding: 24px 18px; }
      .chat-header { padding: 12px 14px; }
      #messages { padding: 14px; }
    }
  </style>
</head>
<body>

<!-- ══ LOBBY ══════════════════════════════════════════════════ -->
<div id="lobby">
  <div class="logo-wrap">
    <div class="logo-icon">🕶️</div>
    <div class="logo-name">AnonRoom</div>
    <div class="logo-sub">Say anything. No one knows who you are.</div>
  </div>

  <div class="card">
    <div class="card-title">Create a Room</div>
    <div class="input-group">
      <input type="text" id="create-room-id" placeholder="Room name (e.g. team-standup)" maxlength="40" autocomplete="off" spellcheck="false" />
    </div>
    <div class="err-msg" id="create-err"></div>
    <button class="btn" onclick="createRoom()">✦ Create Room</button>

    <div class="divider">or join existing</div>

    <div class="card-title">Join a Room</div>
    <div class="input-group">
      <input type="text" id="join-room-id" placeholder="Enter room code" maxlength="40" autocomplete="off" spellcheck="false" />
    </div>
    <div class="err-msg" id="join-err"></div>
    <button class="btn btn-ghost" onclick="joinRoom()">→ Join Room</button>
  </div>

  <div class="anon-badge">
    🔒 <strong>Completely anonymous.</strong> No accounts, no names, no tracking.<br>
    Everyone sees a random color + animal. Even we don't know who's who.
  </div>
</div>

<!-- ══ CHAT APP ════════════════════════════════════════════════ -->
<div id="chat-app">
  <div class="chat-header">
    <div class="header-left">
      <div class="room-pill" onclick="copyRoomCode()" title="Click to copy room code">
        <div class="room-pill-label">
          <span class="online-dot"></span>
          <span id="room-label">#room</span>
        </div>
      </div>
      <span class="online-count" id="online-count"></span>
    </div>
    <div class="my-identity">
      <div class="identity-dot" id="my-dot"></div>
      <span id="my-name-label">You</span>
    </div>
    <button class="btn-leave" onclick="leaveRoom()">Leave</button>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-hint">
      <div class="icon">🕶️</div>
      <div>No messages yet.<br>Be the first to say something.</div>
    </div>
  </div>

  <div class="typing-bar" id="typing-bar"></div>

  <div class="chat-footer">
    <textarea id="msg-input" rows="1" placeholder="Message…" maxlength="2000"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, push, onValue, off, set, onDisconnect, get, query, orderByChild, limitToLast, remove }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBh41U_nbTINVXaSRSB4qjPEljU16zOPzI",
    authDomain:        "sssss-9ec07.firebaseapp.com",
    databaseURL:       "https://sssss-9ec07-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "sssss-9ec07",
    storageBucket:     "sssss-9ec07.firebasestorage.app",
    messagingSenderId: "650031451286",
    appId:             "1:650031451286:web:a2310d3f8fd9853ca2c6b7"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── IDENTITY ──────────────────────────────────────────────
  const ANIMALS = ["Fox","Wolf","Owl","Bear","Lynx","Hawk","Deer","Crow","Seal","Mink","Vole","Frog","Kite","Ibis","Newt","Tern","Wren","Bison","Puma","Toad"];
  const COLORS  = ["#f97316","#22c55e","#3b82f6","#ec4899","#a855f7","#14b8a6","#eab308","#ef4444","#06b6d4","#f59e0b","#10b981","#6366f1","#84cc16","#fb923c","#e879f9","#38bdf8","#4ade80","#fb7185","#c084fc","#34d399"];

  function getMyIdentity() {
    let id = sessionStorage.getItem('anon_id');
    if (!id) {
      const a = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
      const c = COLORS[Math.floor(Math.random() * COLORS.length)];
      id = JSON.stringify({ animal: a, color: c, uid: crypto.randomUUID().slice(0,8) });
      sessionStorage.setItem('anon_id', id);
    }
    return JSON.parse(id);
  }

  const ME = getMyIdentity();
  document.getElementById('my-dot').style.background = ME.color;
  document.getElementById('my-name-label').textContent = `${ME.color.slice(1,4)} ${ME.animal}`;

  // ── STATE ─────────────────────────────────────────────────
  let currentRoom    = null;
  let msgListenerRef = null;
  let presenceRef    = null;
  let typingTimeout  = null;
  let lastSenderId   = null;
  let lastSenderTs   = 0;

  // ── LOBBY ─────────────────────────────────────────────────
  window.createRoom = async function() {
    const raw = document.getElementById('create-room-id').value.trim();
    const err = document.getElementById('create-err');
    if (!raw) { err.textContent = 'Enter a room name.'; return; }
    const roomId = slugify(raw);
    if (roomId.length < 2) { err.textContent = 'Room name too short.'; return; }
    err.textContent = '';
    await enterRoom(roomId);
  };

  window.joinRoom = async function() {
    const raw = document.getElementById('join-room-id').value.trim();
    const err = document.getElementById('join-err');
    if (!raw) { err.textContent = 'Enter a room code.'; return; }
    const roomId = slugify(raw);
    err.textContent = '';
    await enterRoom(roomId);
  };

  function slugify(s) {
    return s.toLowerCase().replace(/[^a-z0-9\-_]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
  }

  // ── ENTER ROOM ────────────────────────────────────────────
  async function enterRoom(roomId) {
    currentRoom = roomId;

    presenceRef = ref(db, `rooms/${roomId}/presence/${ME.uid}`);
    await set(presenceRef, { color: ME.color, animal: ME.animal, ts: Date.now() });
    onDisconnect(presenceRef).remove();

    document.getElementById('lobby').style.display    = 'none';
    document.getElementById('chat-app').style.display = 'flex';
    document.getElementById('room-label').textContent = `#${roomId}`;

    appendSystem(`You joined as ${ME.color.slice(1,4)} ${ME.animal}`);

    // Online count
    onValue(ref(db, `rooms/${roomId}/presence`), snap => {
      const n = snap.exists() ? Object.keys(snap.val()).length : 0;
      document.getElementById('online-count').textContent = `${n} online`;
    });

    // Messages (last 200)
    msgListenerRef = query(
      ref(db, `rooms/${roomId}/messages`),
      orderByChild('ts'),
      limitToLast(200)
    );
    const msgContainer = document.getElementById('messages');
    let initialLoad = true;

    onValue(msgListenerRef, snap => {
      if (initialLoad) {
        msgContainer.innerHTML = '';
        if (!snap.exists()) {
          msgContainer.innerHTML = '<div class="empty-state" id="empty-hint"><div class="icon">🕶️</div><div>No messages yet.<br>Be the first to say something.</div></div>';
        } else {
          snap.forEach(child => renderMsg(child.val(), false));
          msgContainer.scrollTop = msgContainer.scrollHeight;
        }
        initialLoad = false;
      } else {
        if (!snap.exists()) return;
        const all = [];
        snap.forEach(c => all.push(c.val()));
        const newest = all[all.length - 1];
        if (newest) {
          const existing = msgContainer.querySelector(`[data-ts="${newest.ts}"][data-uid="${newest.uid}"]`);
          if (!existing) { removeEmpty(); renderMsg(newest, true); }
        }
      }
    });

    // Typing indicator
    onValue(ref(db, `rooms/${roomId}/typing`), snap => {
      if (!snap.exists()) { setTypingBar(''); return; }
      const others = Object.entries(snap.val())
        .filter(([uid]) => uid !== ME.uid)
        .filter(([, v]) => Date.now() - v.ts < 4000);
      if (!others.length) { setTypingBar(''); return; }
      const names = others.map(([, v]) => `${v.color.slice(1,4)} ${v.animal}`).join(', ');
      setTypingBar(others.length === 1 ? `${names} is typing…` : `${names} are typing…`);
    });

    // Input handlers
    const inp = document.getElementById('msg-input');
    inp.addEventListener('input', () => {
      inp.style.height = 'auto';
      inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
      handleTyping();
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    inp.focus();
  }

  // ── RENDER MESSAGE ────────────────────────────────────────
  function renderMsg(data, animate) {
    if (!data || !data.text) return;
    const isMe = data.uid === ME.uid;
    const container = document.getElementById('messages');
    const now = data.ts || Date.now();
    const sameCluster = data.uid === lastSenderId && (now - lastSenderTs) < 120000;
    lastSenderId = data.uid;
    lastSenderTs = now;

    const row = document.createElement('div');
    row.className = `msg-row ${isMe ? 'mine' : 'others'}`;
    row.dataset.ts  = data.ts;
    row.dataset.uid = data.uid;
    if (!animate) row.style.animation = 'none';

    const avatarEl = document.createElement('div');
    avatarEl.className = `avatar${sameCluster ? ' hidden' : ''}`;
    avatarEl.style.background = data.color;
    avatarEl.textContent = data.animal[0];

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';

    if (!sameCluster && !isMe) {
      const nameEl = document.createElement('div');
      nameEl.className = 'bubble-name';
      nameEl.style.color = data.color;
      nameEl.textContent = `${data.color.slice(1,4)} ${data.animal}`;
      wrap.appendChild(nameEl);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = data.text;

    const timeEl = document.createElement('div');
    timeEl.className = 'bubble-time';
    timeEl.textContent = formatTime(data.ts);

    wrap.appendChild(bubble);
    wrap.appendChild(timeEl);

    if (isMe) { row.appendChild(wrap); row.appendChild(avatarEl); }
    else       { row.appendChild(avatarEl); row.appendChild(wrap); }

    container.appendChild(row);
    if (animate || isMe) container.scrollTop = container.scrollHeight;
  }

  // ── SEND ──────────────────────────────────────────────────
  window.sendMessage = async function() {
    const inp  = document.getElementById('msg-input');
    const text = inp.value.trim();
    if (!text || !currentRoom) return;
    inp.value = '';
    inp.style.height = 'auto';
    clearTyping();

    const msgsRef = ref(db, `rooms/${currentRoom}/messages`);
    await push(msgsRef, {
      text,
      uid:    ME.uid,
      color:  ME.color,
      animal: ME.animal,
      ts:     Date.now()
    });
    pruneOldMessages(msgsRef);
  };

  async function pruneOldMessages(msgsRef) {
    const cutoff = Date.now() - 48 * 60 * 60 * 1000;
    const snap = await get(query(msgsRef, orderByChild('ts'), limitToLast(500)));
    if (!snap.exists()) return;
    snap.forEach(child => { if (child.val().ts < cutoff) remove(child.ref); });
  }

  // ── TYPING ────────────────────────────────────────────────
  function handleTyping() {
    if (!currentRoom) return;
    set(ref(db, `rooms/${currentRoom}/typing/${ME.uid}`), { color: ME.color, animal: ME.animal, ts: Date.now() });
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(clearTyping, 3000);
  }
  function clearTyping() {
    if (!currentRoom) return;
    clearTimeout(typingTimeout);
    remove(ref(db, `rooms/${currentRoom}/typing/${ME.uid}`));
  }
  function setTypingBar(text) { document.getElementById('typing-bar').textContent = text; }

  // ── LEAVE ─────────────────────────────────────────────────
  window.leaveRoom = function() {
    if (msgListenerRef) { off(msgListenerRef); msgListenerRef = null; }
    if (presenceRef)    { remove(presenceRef); presenceRef = null; }
    clearTyping();
    currentRoom = null; lastSenderId = null; lastSenderTs = 0;
    document.getElementById('messages').innerHTML = '';
    document.getElementById('msg-input').value = '';
    document.getElementById('chat-app').style.display = 'none';
    document.getElementById('lobby').style.display     = 'flex';
  };

  // ── COPY ROOM LINK ────────────────────────────────────────
  window.copyRoomCode = function() {
    const url = `${location.origin}${location.pathname}?room=${currentRoom}`;
    navigator.clipboard.writeText(url).then(() => showToast('Room link copied! 🔗'));
  };

  // ── UTILS ─────────────────────────────────────────────────
  function appendSystem(text) {
    const el = document.createElement('div');
    el.className = 'msg-system';
    el.textContent = text;
    document.getElementById('messages').appendChild(el);
  }
  function removeEmpty() { const h = document.getElementById('empty-hint'); if (h) h.remove(); }
  function formatTime(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── AUTO-JOIN FROM URL ────────────────────────────────────
  const urlRoom = new URLSearchParams(location.search).get('room');
  if (urlRoom) enterRoom(urlRoom.toLowerCase().replace(/[^a-z0-9\-_]/g,'-'));

  document.getElementById('create-room-id').addEventListener('keydown', e => { if (e.key==='Enter') createRoom(); });
  document.getElementById('join-room-id').addEventListener('keydown',   e => { if (e.key==='Enter') joinRoom(); });
</script>

</body>
</html>
